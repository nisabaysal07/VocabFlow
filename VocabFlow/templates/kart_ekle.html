{% extends 'base.html' %}

{% block title %}
    Kart ekle - Deste ID: {{ deste_id }}
{% endblock%}

{% block body %}
        <div class="login-container" >
            <div class="home-deste">
                <h1>Desteye kart ekle</h1>
                <div class="login-form">
                    <form method="POST">
                        <input type="text" name="on_yazi" placeholder="Ön Yazı" required>
                        <input type="text" name="arka_yazi" placeholder="Arka Yazı" required>
                        <textarea name="cumle" placeholder="Örnek cümle"></textarea>
                        <button type="submit" class="submit-btn">Kart ekle</button>
                    </form>
                    <br>
                    <a href="{{ url_for('study', deste_id=deste_id) }} " class="btn" >Çalışmaya devam et</a>
                </div>
            </div>
        </div>
{% endblock %}
